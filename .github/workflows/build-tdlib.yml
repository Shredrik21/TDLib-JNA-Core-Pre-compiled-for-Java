name: Build TDLib Native Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gperf php-cli libssl-dev zlib1g-dev

      - name: Clone TDLib source
        run: |
          git clone https://github.com/tdlib/td.git tdlib-src

      - name: Configure CMake
        run: |
          cd tdlib-src
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_JNI=OFF -DTD_ENABLE_DOTNET=OFF ..

      - name: Compile core static libraries
        run: |
          cd tdlib-src/build
          cmake --build . --target tdjson_static --parallel $(nproc)
          cmake --build . --target tdclient --parallel $(nproc)

      - name: Link shared library (libtdjson.so)
        run: |
          cd tdlib-src/build
          g++ -shared -fPIC -Wl,--whole-archive \
            libtdjson_static.a \
            libtdclient.a \
            libtdcore.a \
            libtdapi.a \
            libtdutils.a \
            libtdactor.a \
            libtdnet.a \
            libtddb.a \
            -Wl,--no-whole-archive \
            -lssl -lcrypto -lz -lrt -ldl -lpthread \
            -o libtdjson.so

      - name: Deploy binary to resources
        run: |
          mkdir -p src/main/resources/linux-x86-64/
          cp tdlib-src/build/libtdjson.so src/main/resources/linux-x86-64/libtdjson.so
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources/linux-x86-64/libtdjson.so
          git commit -m "chore: automated build of libtdjson.so from latest TDLib master" || echo "No changes to commit"
          git push
